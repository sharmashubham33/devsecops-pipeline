# Stage 4: SBOM Generation
# Creates a Software Bill of Materials listing every dependency in the image.
#
# SOC2 mapping: CC3.1 (risk assessment), CC7.2 (vulnerability management)

name: SBOM - Software Bill of Materials

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image for SBOM scan
        run: docker build -t devsecops-demo:${{ github.sha }} ./app

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX JSON)
        run: |
          syft devsecops-demo:${{ github.sha }} \
            --output spdx-json=sbom-spdx.json

      - name: Generate SBOM (CycloneDX)
        run: |
          syft devsecops-demo:${{ github.sha }} \
            --output cyclonedx-json=sbom-cyclonedx.json

      - name: SBOM Summary
        run: |
          echo "=== SBOM Summary ==="
          python3 -c "
          import json
          data = json.load(open('sbom-spdx.json'))
          pkgs = data.get('packages', [])
          print(f'Total packages: {len(pkgs)}')
          for p in pkgs[:10]:
              print(f'  - {p.get(\"name\", \"unknown\")} {p.get(\"versionInfo\", \"\")}')
          if len(pkgs) > 10:
              print(f'  ... and {len(pkgs) - 10} more')
          "

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json
