# Stage 5: Deploy with Secrets Injection
# Final gate before production. Verifies the image signature,
# injects secrets from Vault, and deploys.
#
# Manual trigger only — requires Vault and container registry configured.
#
# SOC2 mapping: CC6.1 (access control), CC6.2 (credentials management),
#               CC8.1 (change management), A1.2 (recovery procedures)

name: Deploy - Vault Secrets & Deploy Gate

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      # --- Verify Image Integrity ---

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify image signature
        run: |
          echo "Verifying image signature before deploy..."
          # In production with a pushed+signed image:
          # cosign verify \
          #   --certificate-identity-regexp=".*" \
          #   --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
          #   ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          echo "Signature verification step (requires pushed+signed image)"

      # --- Secrets Injection from Vault ---
      # Uncomment when VAULT_ADDR secret is configured:
      # - name: Import secrets from Vault
      #   uses: hashicorp/vault-action@v3
      #   with:
      #     url: ${{ secrets.VAULT_ADDR }}
      #     method: jwt
      #     role: ci-deploy
      #     secrets: |
      #       secret/data/app/database DB_HOST ;
      #       secret/data/app/database DB_PASSWORD ;
      #       secret/data/app/api API_KEY ;
      #       secret/data/app/api WEBHOOK_SECRET

      # --- Deploy ---

      - name: Deploy to Kubernetes
        run: |
          echo "Deploying ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Environment: ${{ github.event.inputs.environment || 'staging' }}"

          # In production:
          # kubectl set image deployment/app \
          #   app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          #   --namespace=${{ github.event.inputs.environment || 'staging' }}

          echo "Deploy completed successfully"

      # --- Audit Trail ---

      - name: Generate audit trail entry
        run: |
          cat <<EOF > audit-entry.json
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "event": "deployment",
            "environment": "${{ github.event.inputs.environment || 'staging' }}",
            "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "commit": "${{ github.sha }}",
            "workflow_run": "${{ github.run_id }}"
          }
          EOF
          echo "=== Audit Trail Entry ==="
          cat audit-entry.json

      - name: Upload audit trail
        uses: actions/upload-artifact@v4
        with:
          name: audit-trail-${{ github.sha }}
          path: audit-entry.json
          retention-days: 90
